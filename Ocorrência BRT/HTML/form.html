<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura de Ocorrências - BRT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/form.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <div class="logo-maas">
                    <img class="logo-img-maas" src="../Imagens/Logo Maas.png" alt="Maas Logo">
                </div>
                <div class="Linha"></div>
                <div class="logo-brt">
                    <img class="logo-img-brt" src="../Imagens/Logo BRT.png" alt="Brt Logo">
                </div>
            </div>

            <div class="header-text">
                <h1>Ocorrências</h1>
                <p>Abertura – BRT</p>
                <div class="user-profile" style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
                    <span id="lblNomeUsuario" style="font-weight: 600; color: #000000;">👤 Olá, Carregando...</span>
                    <a href="#" id="btnSair" style="font-size: 13px; color: #ef4444; text-decoration: none; font-weight: bold;">Sair [x]</a>
                </div>  
            </div>
            
        </header>

        <form action="#" method="POST">
            
            <div class="card">
                <div class="card-title">1º Informações do Veículo</div>
                
                <div class="row">
                    <div class="col">
                        <label>Status da Ocorrência</label>
                        <div class="input-group readonly-group">
                            <input type="text" id="txtStatusOcorrencia" value="Pendente" readonly class="readonly-field" style="font-weight: bold; color: #eab308;">
                        </div>
                        <label><span class="required">*</span> Nº da Ocorrência</label>
                        <div class="input-group">
                            <input type="text" id="txtNumOcorrencia" placeholder="Nº da O.C">
                            <button type="button" id="btnNovaOcorrencia" class="action-btn green-btn"><i class="fas fa-plus"></i></button>
                        </div>
                                
                        <label><span class="required">*</span> Prefixo / Placa</label>
                        <div class="input-group">
                            <input type="text" id="txtPrefixoOcorrencia" placeholder="Prefixo / Placa do Veículo">
                            <button type="button" id="btnBuscaPrefixoOcorrencia" class="action-btn green-btn"><i class="fas fa-search"></i></button>
                        </div>

                        <label><span class="required">*</span> Km do Veículo</label>
                        <div class="input-group">
                            <input type="text" id="txtKmAtualOcorrencia" placeholder="Km Atual">
                            <span class="icon-passive"><i class="fas fa-tachometer-alt"></i></span>
                        </div>
                    </div>
                    
                    <div class="col">
                        <label>Abertura</label>
                        <div class="input-group readonly-group">
                            <input type="text" id="txtDataAberturaOcorrencia" placeholder="DD/MM/AAAA" readonly class="readonly-field" tabindex="-1">
                            <span class="icon-passive"><i class="far fa-calendar-alt"></i></span>
                        </div>
                      
                        <label>Nome do Bem</label>
                        <div class="input-group readonly-group">
                            <input type="text" id="txtNomeBemOcorrencia" placeholder="Nome do Bem" readonly class="readonly-field"tabindex="-1">
                            <span class="icon-passive"><i class="fas fa-bus"></i></span>
                        </div>
                         <label>Contato</label>
                        <div class="input-group readonly-group">
                            <input type="text" id="txtContatoOcorrencia" placeholder="Informe o Contato">
                            <span class="icon-passive"><i class="fas fa-mobile"></i></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">2º Defeito Relatado e Localização do Veículo</div>
                
                <div class="row">
                    <div class="col">
                        <label class="req" for="cboLocais"><span class="required">*</span> Locais Constantes</label>
                        <div class="input-group select-group">
                            <select id="cboLocaisConstantes">
                                <option value="">Selecione</option>
                                <option value="Garagem-Maas">Garagem - Maas</option>
                                <option value="Garagem-BRT">Garagem - BRT</option>
                                <option value="Outros">Outros...</option>
                            </select>
                            <span class="action-btn green-btn small-arrow"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <textarea id="txtDescricaoLocal" placeholder="Descrição do Local do Veículo ..." class="mt-15"></textarea>
                    </div>
                    
                    <div class="col">
                        <label for="txtDescricaoDefeitoOcorrencia"><span class="required">*</span> Defeito Relatado</label>
                        <textarea id="txtDefeitoRelatadoOcorrencia" placeholder="Descrição do Problema do Veículo ..." class="h-full"></textarea>
                    </div>
                </div>
            </div>

            <div class="btn-submit-container">
                <button type="submit" class="btn-submit">Salvar 📋</button>
            </div>
                
        </form>
    </div>

            <div id="modalBuscaVeiculo" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <header class="modal-header">
                    <h2>Pesquisar Veículo</h2>
                    <button id="btnFecharModalVeiculo" class="btn-close">&times;</button>
                </header>
                
                <div class="modal-body">
                    <div class="input-group">
                        <label for="txtPesquisaModalVeiculo">Placa ou Prefixo:</label>
                        <input type="text" id="txtPesquisaModalVeiculo" placeholder="Ex: BRT1234 ou 1024">
                    </div>

                    <div class="table-container">
                        <table class="table-maas">
                            <thead>
                                <tr>
                                    <th style="margin-bottom: 1px;">Prefixo</th>
                                    <th>Placa</th>
                                    <th>Modelo</th>
                                    <th>Ação</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaResultadosVeiculos">
                                <tr><td colspan="4" style="text-align: center;">Digite para pesquisar...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer>
        <span style="font-weight: 600; color: #6b7280;">Versão 1.00-Homolog</span>
        <span style="margin: 0 0.5rem;"">|</span>
        Publicado em 27/03/2026
        <span style="margin: 0 0.5rem;">|</span>
        <span style="font-weight: 600; color: #6b7280;">BI MAAS</span>
        </span>
    </footer>
        <script type="module" src="../JS/form.js"></script>
        <script type="module" src="../JS/supabaseClient.js">Su</script>
</body>
</html>

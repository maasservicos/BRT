<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura de Ocorrências - BRT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="teste.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <div class="logo-maas">
                    <img class="logo-img-maas" src="Ocorrência BRT/Imagens/3.png" alt="Maas Logo">
                </div>
                <div class="Linha"></div>
                <div class="logo-brt">
                    <img class="logo-img-brt" src="Ocorrência BRT/Imagens/brt.png" alt="Brt Logo">
                </div>
            </div>

            <div class="header-text">
                <h1>Ocorrências</h1>
                <p>Abertura – BRT</p>
            </div>
        </header>

        <form action="#" method="POST">
            
            <div class="card">
                <div class="card-title">1º Informações do Veículo</div>
                
                <div class="row">
                    <div class="col">
                        <label><span class="required">*</span> Nº da Ocorrência</label>
                        <div class="input-group">
                            <input type="text" placeholder="Nº da O.C">
                            <button type="button" class="action-btn green-btn"><i class="fas fa-plus"></i></button>
                        </div>
                                
                        <label><span class="required">*</span> Prefixo / Placa</label>
                        <div class="input-group">
                            <input type="text" placeholder="Prefixo / Placa do Veículo">
                            <button type="button" class="action-btn green-btn"><i class="fas fa-search"></i></button>
                        </div>

                        <label><span class="required">*</span> Km do Veículo</label>
                        <div class="input-group">
                            <input type="text" placeholder="Km Atual">
                            <span class="icon-passive"><i class="fas fa-tachometer-alt"></i></span>
                        </div>
                    </div>
                    
                    <div class="col">
                        <label>Abertura</label>
                        <div class="input-group readonly-group">
                            <input type="text" placeholder="DD/MM/AAAA" readonly class="readonly-field">
                            <span class="icon-passive"><i class="far fa-calendar-alt"></i></span>
                        </div>
                      
                        <label>Nome do Bem</label>
                        <div class="input-group readonly-group">
                            <input type="text" value="Nome do Bem" readonly class="readonly-field">
                            <span class="icon-passive"><i class="fas fa-bus"></i></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">2º Defeito Relatado e Localização do Veículo</div>
                
                <div class="row">
                    <div class="col">
                        <label><span class="required">*</span> Locais Constantes</label>
                        <div class="input-group select-group">
                            <select>
                                <option value="">Selecione</option>
                                <option value="Garagem-Maas">Garagem - Maas</option>
                                <option value="Garagem-BRT">Garagem - BRT</option>
                            </select>
                            <span class="action-btn green-btn small-arrow"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <textarea placeholder="Descrição do Local do Veículo ..." class="mt-15"></textarea>
                    </div>
                    
                    <div class="col">
                        <label><span class="required">*</span> Defeito Relatado</label>
                        <textarea placeholder="Descrição do Problema do Veículo ..." class="h-full"></textarea>
                    </div>
                </div>
            </div>

            <div class="btn-submit-container">
                <button type="submit" class="btn-submit">Salvar 📋</button>
                
            </div>

        </form>
    </div>

</body>
</html>
